<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CMN Dual Strike Pro</title>
    
    <!-- Librării Externe: PeerJS pentru P2P și QRCode pentru conectare rapidă -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        :root {
            --p1-color: #00e5ff; /* Cyan pentru Host */
            --p2-color: #ff0055; /* Magenta pentru Guest */
            --bg-color: #05050a;
            --ui-glass: rgba(20, 20, 30, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; font-family: 'Orbitron', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            width: 100vw; height: 100vh;
            touch-action: none; /* Previne gesturile native pe mobil */
        }

        /* Sistem de Ecrane (Screens) */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #111522 0%, var(--bg-color) 100%);
            z-index: 10;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .screen.hidden { opacity: 0; pointer-events: none; z-index: -1; transform: scale(1.05); }

        /* Typography & Neon Effects */
        h1 { 
            font-size: 3rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 40px; text-align: center; 
            text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 30px var(--p1-color);
        }
        .title-dual { color: white; }
        .title-strike { color: var(--p2-color); font-weight: 900; }

        /* Butoane Premium */
        .btn {
            background: var(--ui-glass); backdrop-filter: blur(10px);
            border: 2px solid white; color: white;
            padding: 18px 50px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;
            margin: 12px; border-radius: 40px; cursor: pointer; transition: all 0.2s;
            position: relative; overflow: hidden; font-weight: 700;
        }
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-host { border-color: var(--p1-color); box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); color: var(--p1-color); }
        .btn-join { border-color: var(--p2-color); box-shadow: 0 0 20px rgba(255, 0, 85, 0.3); color: var(--p2-color); }

        /* Meniuri Secundare (Lobby/Join) */
        .panel {
            background: var(--ui-glass); padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .qr-wrapper {
            background: white; padding: 15px; border-radius: 15px; margin: 20px 0;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
        }

        .code-input {
            background: rgba(0,0,0,0.5); border: 2px solid var(--p2-color);
            color: white; font-size: 2rem; text-align: center; padding: 15px; border-radius: 15px;
            outline: none; text-transform: uppercase; letter-spacing: 5px; margin: 20px 0; width: 100%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8); font-family: monospace;
        }

        /* Game UI */
        #gameUI {
            position: absolute; inset: 0; pointer-events: none; z-index: 20;
            display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px;
        }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; transform: rotate(180deg); }
        .hud-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        
        .health-bar { display: flex; gap: 8px; }
        .heart { width: 25px; height: 10px; background: white; border-radius: 5px; box-shadow: 0 0 15px white; transition: 0.3s; }
        .heart.lost { background: rgba(255,255,255,0.1); box-shadow: none; border: 1px solid rgba(255,255,255,0.2); }

        .player-label { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 5px; }

        canvas { display: block; width: 100%; height: 100%; }
        
        /* Notificări Toast */
        .toast {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 25px;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); font-size: 14px;
            z-index: 100; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: bold; letter-spacing: 1px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <!-- Notificări -->
    <div class="toast" id="toastBox">Mesaj de sistem</div>

    <!-- ECRAN 1: MENIU PRINCIPAL -->
    <div class="screen" id="menuScreen">
        <h1><span class="title-dual">DUAL</span><br><span class="title-strike">STRIKE</span></h1>
        <button class="btn btn-host" onclick="hostGame()">Gazduiește Joc</button>
        <button class="btn btn-join" onclick="showJoinScreen()">Alătură-te</button>
        <div style="position: absolute; bottom: 20px; font-size: 10px; color: #555; letter-spacing: 2px;">V 2.0 REALTIME ENGINE</div>
    </div>

    <!-- ECRAN 2: LOBBY GAZDĂ -->
    <div class="screen hidden" id="hostScreen">
        <div class="panel">
            <h2 style="color: var(--p1-color); margin-bottom: 10px;">LOBBY GAZDĂ</h2>
            <p style="font-size: 12px; color: #aaa; text-align: center;">Prietenul tău trebuie să scaneze acest cod QR sau să introducă codul de mai jos.</p>
            
            <div class="qr-wrapper" id="qrcode"></div>
            
            <div style="font-size: 2rem; font-weight: 900; letter-spacing: 5px; color: white;" id="roomIdDisplay">...</div>
            
            <button class="btn" style="margin-top: 30px; font-size: 14px; padding: 10px 30px;" onclick="location.reload()">Anulează</button>
        </div>
    </div>

    <!-- ECRAN 3: CONECTARE OASPETE -->
    <div class="screen hidden" id="joinScreen">
        <div class="panel">
            <h2 style="color: var(--p2-color); margin-bottom: 10px;">CONECTARE</h2>
            <p style="font-size: 12px; color: #aaa; text-align: center;">Introdu codul afișat pe ecranul prietenului tău.</p>
            
            <input type="text" class="code-input" id="joinCodeInput" placeholder="EX: A1B2C" maxlength="6">
            
            <button class="btn btn-join" style="width: 100%;" onclick="joinGameFromInput()">Conectează-te</button>
            <button class="btn" style="width: 100%; font-size: 14px; padding: 10px;" onclick="location.reload()">Înapoi</button>
        </div>
    </div>

    <!-- ECRAN 4: GAME OVER -->
    <div class="screen hidden" id="gameOverScreen">
        <h1 id="gameOverTitle" style="font-size: 4rem; margin-bottom: 20px;">VICTORIE</h1>
        <p id="gameOverSub" style="color: #aaa; margin-bottom: 40px; letter-spacing: 2px;">Inamicul a fost distrus</p>
        <button class="btn" onclick="location.reload()">Meniu Principal</button>
    </div>

    <!-- ECRAN 5: GAMEPLAY -->
    <div class="screen hidden" id="gameScreen" style="background: transparent;">
        <div id="gameUI">
            <!-- HUD Inamic (Sus, rotit la 180 grade pentru tip-to-tip) -->
            <div class="hud-top">
                <div>
                    <div class="player-label">INAMIC</div>
                    <div class="health-bar" id="enemyHealthUI">
                        <div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div>
                    </div>
                </div>
            </div>
            
            <!-- HUD Jucător (Jos) -->
            <div class="hud-bottom">
                <div>
                    <div class="player-label">SCUTURILE TALE</div>
                    <div class="health-bar" id="myHealthUI">
                        <div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div>
                    </div>
                </div>
                <div style="font-size: 10px; color: rgba(255,255,255,0.3);" id="pingDisplay">PING: --</div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- Referințe DOM Globale ---
        const UI = {
            menu: document.getElementById('menuScreen'),
            host: document.getElementById('hostScreen'),
            join: document.getElementById('joinScreen'),
            game: document.getElementById('gameScreen'),
            gameOver: document.getElementById('gameOverScreen'),
            toast: document.getElementById('toastBox')
        };
        
        // Funcții Utilitare UI
        function showToast(text, duration = 3000) {
            UI.toast.innerText = text;
            UI.toast.classList.add('show');
            setTimeout(() => UI.toast.classList.remove('show'), duration);
        }

        function switchScreen(screenName) {
            Object.values(UI).forEach(s => {
                if(s && s.classList) s.classList.add('hidden');
            });
            UI[screenName].classList.remove('hidden');
        }

        function generateShortId() { return Math.random().toString(36).substring(2, 7).toUpperCase(); }

        // --- Variabile Rețea P2P ---
        let peer = null;
        let conn = null;
        let isHost = false;
        let myColor = '';
        let enemyColor = '';
        
        // --- Variabile Joc ---
        const MAX_HP = 5;
        let gameActive = false;
        let myHealth = MAX_HP;
        let enemyHealth = MAX_HP;
        let lastNetTick = 0;
        
        // --- Setup Canvas ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        
        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. GĂZDUIRE JOC
        function hostGame() {
            isHost = true;
            myColor = 'var(--p1-color)';
            enemyColor = 'var(--p2-color)';
            
            const roomId = "CMN-" + generateShortId();
            switchScreen('host');
            document.getElementById('roomIdDisplay').innerText = roomId.replace('CMN-', '');

            peer = new Peer(roomId);

            peer.on('open', (id) => {
                showToast("Sesiune creată. Așteptăm un jucător...");
                // QR Code Generare
                const joinUrl = window.location.href.split('?')[0] + "?join=" + id;
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById('qrcode'), {
                    text: joinUrl, width: 220, height: 220,
                    colorDark : "#00e5ff", colorLight : "#ffffff"
                });
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnectionHandlers();
            });

            peer.on('error', (err) => showToast("Eroare de rețea: " + err.type));
        }

        // 2. ALĂTURARE JOC (GUEST)
        function showJoinScreen() { switchScreen('join'); }

        function joinGameFromInput() {
            const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
            if(code.length === 0) return;
            joinGame("CMN-" + code);
        }

        function joinGame(hostId) {
            isHost = false;
            myColor = 'var(--p2-color)';
            enemyColor = 'var(--p1-color)';
            
            showToast("Conectare la " + hostId + "...");
            peer = new Peer();

            peer.on('open', (id) => {
                // Pentru viteză maximă în jocuri, dezactivăm 'reliable' dacă browserul suportă canale UDP over WebRTC.
                // Însă, pentru stabilitatea evenimentelor (hit, bullet) păstrăm default. Vom optimiza pachetele.
                conn = peer.connect(hostId);
                conn.on('open', () => setupConnectionHandlers());
                conn.on('error', () => showToast("Conexiune eșuată!"));
            });
        }

        function setupConnectionHandlers() {
            showToast("CONEXIUNE STABILITĂ!", 2000);
            
            conn.on('data', (data) => {
                if (!gameActive) return;
                
                // Parsare Protocol Ultra-Lightweight (pentru performanță max)
                // {t: 'tip', x: coordonata, ...}
                switch(data.t) {
                    case 'p': // P = Poziție Inamic
                        // Inamicul e față în față, deci axa X e oglindită vizual!
                        enemy.targetX = 1.0 - data.x; 
                        break;
                    case 'b': // B = Bullet (Glonț primit)
                        // Glonțul lui iese pe sus la el, deci intră pe sus la mine. Oglindim X.
                        bullets.push({ 
                            x: 1.0 - data.x, 
                            y: 0, // Intră pe la marginea de sus
                            vy: 0.02, // Se mișcă în JOS (+)
                            isMine: false, color: enemyColor 
                        });
                        // Efect vizual intrare glonț
                        createExplosion((1.0 - data.x) * width, 0, enemyColor, 5);
                        break;
                    case 'h': // H = Hit (Eu am lovit inamicul)
                        enemyHealth = data.hp;
                        updateHealthUI('enemyHealthUI', enemyHealth);
                        createExplosion(enemy.x * width, enemy.y * height, enemyColor, 20);
                        if (enemyHealth <= 0) gameOver(true); // Am câștigat!
                        break;
                }
            });

            conn.on('close', () => {
                showToast("Inamicul a părăsit jocul.", 5000);
                setTimeout(() => location.reload(), 2000);
            });

            setTimeout(initGameEngine, 1000);
        }

        // Auto-join din QR Code URL
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) { switchScreen('menu'); joinGame(joinId); }
        };

        
        // --- Entități Joc ---
        let player = { x: 0.5, y: 0.85, targetX: 0.5, width: 0.12, height: 0.04 };
        // Inamicul este desenat în partea de sus
        let enemy  = { x: 0.5, y: 0.15, targetX: 0.5, width: 0.12, height: 0.04 }; 
        
        let bullets = [];
        let particles = [];
        let gridOffset = 0;
        let screenShake = 0;
        let lastShootTime = 0;

        function initGameEngine() {
            switchScreen('game');
            gameActive = true;
            myHealth = MAX_HP;
            enemyHealth = MAX_HP;
            bullets = [];
            particles = [];
            
            updateHealthUI('myHealthUI', myHealth);
            updateHealthUI('enemyHealthUI', enemyHealth);
            
            // --- Sistem de Control (Touch Optimizat) ---
            let isDragging = false;
            
            canvas.addEventListener('touchstart', (e) => {
                const touchX = e.touches[0].clientX;
                const touchY = e.touches[0].clientY;
                
                // Zona de jos pentru mișcare, oriunde altundeva (sau tap rapid) pentru a trage
                if (touchY > height * 0.6) {
                    isDragging = true;
                    player.targetX = touchX / width;
                } else {
                    shoot();
                }
            }, {passive: false});

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault(); // Previne scroll
                if(isDragging) {
                    let tx = e.touches[0].clientX / width;
                    // Limitare la ecran
                    player.targetX = Math.max(player.width/2, Math.min(1 - player.width/2, tx));
                }
            }, {passive: false});

            canvas.addEventListener('touchend', () => { isDragging = false; });
            
            // Pentru teste pe Desktop
            canvas.addEventListener('mousemove', (e) => {
                player.targetX = Math.max(player.width/2, Math.min(1 - player.width/2, e.clientX / width));
            });
            canvas.addEventListener('mousedown', shoot);

            requestAnimationFrame(gameLoop);
        }

        function shoot() {
            const now = Date.now();
            if(now - lastShootTime > 250) { // Cooldown 250ms
                bullets.push({ 
                    x: player.x, 
                    y: player.y - 0.04, 
                    vy: -0.025, // Merge în SUS (-)
                    isMine: true, color: myColor 
                });
                // Efect recul/propulsie glonț
                createExplosion(player.x * width, player.y * height - 20, '#fff', 5);
                lastShootTime = now;
            }
        }

        function updateHealthUI(elementId, hp) {
            const hearts = document.querySelectorAll(`#${elementId} .heart`);
            hearts.forEach((h, index) => {
                if (index >= hp) h.classList.add('lost');
                else h.classList.remove('lost');
            });
        }

        function gameOver(didIWin) {
            gameActive = false;
            switchScreen('gameOver');
            
            const title = document.getElementById('gameOverTitle');
            const sub = document.getElementById('gameOverSub');
            
            if (didIWin) {
                title.innerText = "VICTORIE";
                title.style.color = myColor; title.style.textShadow = `0 0 30px ${myColor}`;
                sub.innerText = "Inamicul a fost anihilat!";
            } else {
                title.innerText = "DISTRUS";
                title.style.color = 'white'; title.style.textShadow = `0 0 30px red`;
                sub.innerText = "Scuturile tale au cedat...";
            }
            if (conn) setTimeout(() => conn.close(), 2000);
        }

        function gameLoop() {
            if (!gameActive) return;
            updatePhysics();
            renderGraphics();
            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            // 1. Interpolare liniară pentru mișcare super-fluidă (Anulează lag-ul!)
            player.x += (player.targetX - player.x) * 0.3;
            enemy.x += (enemy.targetX - enemy.x) * 0.3; // Interpolăm datele primite de pe net

            // 2. Transmitere Poziție în rețea (Throttle la ~30fps pentru a nu sufoca WebRTC)
            const now = Date.now();
            if (now - lastNetTick > 33) {
                if(conn && conn.open) conn.send({ t: 'p', x: player.x });
                lastNetTick = now;
            }

            // 3. Zguduirea ecranului (Screen Shake decay)
            if (screenShake > 0) screenShake *= 0.9;
            if (screenShake < 0.5) screenShake = 0;

            // 4. Update Fundal (Grid)
            gridOffset = (gridOffset + 2) % 50;

            // 5. Generare particule propulsie navă
            if(Math.random() > 0.5) {
                particles.push({
                    x: player.x * width + (Math.random() - 0.5) * 10,
                    y: player.y * height + 15,
                    vx: (Math.random() - 0.5) * 1, vy: Math.random() * 3 + 2,
                    life: 1.0, color: myColor, size: Math.random() * 3 + 2
                });
            }

            // 6. Update Gloanțe & Coliziuni
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y += b.vy;

                // A. Glonțul MEU iese prin partea de SUS -> Îl trimit în telefonul inamicului
                if (b.isMine && b.y < 0) {
                    if (conn && conn.open) conn.send({ t: 'b', x: b.x });
                    createExplosion(b.x * width, 0, myColor, 5); // Efect "spargere ecran" la ieșire
                    bullets.splice(i, 1);
                    continue;
                }

                // B. Glonțul INAMIC iese prin partea de JOS -> Ratare
                if (!b.isMine && b.y > 1) {
                    bullets.splice(i, 1);
                    continue;
                }

                // C. Coliziune: Glonțul INAMIC mă lovește
                if (!b.isMine) {
                    // Hitbox simplificat pentru navă
                    const hitX = Math.abs(b.x - player.x) < (player.width / 2);
                    const hitY = Math.abs(b.y - player.y) < (player.height / 2);
                    
                    if (hitX && hitY) {
                        myHealth--;
                        updateHealthUI('myHealthUI', myHealth);
                        screenShake = 20; // Cutremur masiv
                        createExplosion(player.x * width, player.y * height, myColor, 30);
                        
                        // Anunț inamicul că M-A LOVIT
                        if (conn && conn.open) conn.send({ t: 'h', hp: myHealth });
                        
                        bullets.splice(i, 1);
                        if (myHealth <= 0) gameOver(false);
                    }
                }
            }

            // 7. Update Particule (Explozii)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function createExplosion(x, y, color, amount) {
            for(let i=0; i<amount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    life: 1.0, color: color, size: Math.random() * 4 + 2
                });
            }
        }

        function renderGraphics() {
            // Curățare cadru cu opacitate mică pentru efect de "motion blur" pe gloanțe
            ctx.fillStyle = 'rgba(5, 5, 10, 0.4)';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            
            // Aplicare Screen Shake
            if (screenShake > 0) {
                const dx = (Math.random() - 0.5) * screenShake;
                const dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
            }

            // 1. Desenare Fundal Cyber-Grid (Perspective falsă 3D)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            // Linii orizontale (mișcare)
            for(let y = gridOffset; y < height; y += 50) {
                ctx.moveTo(0, y); ctx.lineTo(width, y);
            }
            // Linii verticale (fugi spre infinit)
            const centerX = width / 2;
            for(let x = -width; x < width * 2; x += 60) {
                ctx.moveTo(centerX, height/2); // Punct de fugă la mijloc
                ctx.lineTo(x, height);
                ctx.moveTo(centerX, height/2);
                ctx.lineTo(x, 0);
            }
            ctx.stroke();

            // Setări globale Glow (Juice)
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            // Funcție helper pentru desenare navă (Stil Space-Fighter modern)
            const drawShip = (shipObj, isEnemy) => {
                const px = shipObj.x * width;
                const py = shipObj.y * height;
                const pw = shipObj.width * width;
                const ph = shipObj.height * height;
                const color = isEnemy ? enemyColor : myColor;
                const dir = isEnemy ? 1 : -1; // 1 = jos, -1 = sus

                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.fillStyle = '#000'; // Corp negru
                ctx.strokeStyle = color; // Contur Neon
                ctx.lineWidth = 3;

                ctx.beginPath();
                ctx.moveTo(px, py + (ph/2 * dir)); // Vârf
                ctx.lineTo(px - pw/2, py - (ph/2 * dir)); // Aripă Stânga
                ctx.lineTo(px, py - (ph/4 * dir)); // Spate Centru
                ctx.lineTo(px + pw/2, py - (ph/2 * dir)); // Aripă Dreapta
                ctx.closePath();
                
                ctx.fill();
                ctx.stroke();
                
                // Detaliu central (Miez luminos)
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(px, py, 4, 0, Math.PI*2);
                ctx.fill();
            };

            // 2. Desenează Inamicul (Dacă ambii sunt conectați)
            if (enemyHealth > 0) drawShip(enemy, true);

            // 3. Desenează Jucătorul Tău
            if (myHealth > 0) drawShip(player, false);

            // 4. Desenare Gloanțe (Lasere lungi)
            for (let b of bullets) {
                const bx = b.x * width;
                const by = b.y * height;
                const color = b.isMine ? myColor : enemyColor;
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
                ctx.strokeStyle = color;
                ctx.lineWidth = 4;

                ctx.beginPath();
                ctx.moveTo(bx, by);
                // Trage o linie de la poziția curentă spre poziția anterioară (coadă de laser)
                ctx.lineTo(bx, by - (b.vy * 800)); 
                ctx.stroke();

                // Capăt luminos
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(bx, by, 3, 0, Math.PI*2);
                ctx.fill();
            }

            // 5. Desenare Particule
            ctx.globalCompositeOperation = 'lighter'; // Efect de foc/neon suprapus
            for (let p of particles) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            }
            
            ctx.restore();
        }

    </script>
</body>
</html>
