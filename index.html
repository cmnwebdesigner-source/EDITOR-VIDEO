<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CMN Dual Strike</title>
    
    <!-- Librării Externe pentru Conexiune P2P și QR Code -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        :root {
            --p1-color: #00f0ff; /* Cyan pentru Host */
            --p2-color: #ff0055; /* Magenta pentru Guest */
            --bg-color: #0a0a0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; font-family: 'Orbitron', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Screens */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-color); z-index: 10;
            transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; z-index: -1; }

        h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-align: center; }
        .glow-text { text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .btn {
            background: transparent; border: 2px solid white; color: white;
            padding: 15px 40px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;
            margin: 10px; border-radius: 30px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        .btn:active { transform: scale(0.95); }
        .btn-host { border-color: var(--p1-color); color: var(--p1-color); box-shadow: 0 0 15px var(--p1-color); }
        .btn-join { border-color: var(--p2-color); color: var(--p2-color); box-shadow: 0 0 15px var(--p2-color); }

        /* Lobby Screen */
        .qr-container {
            background: white; padding: 15px; border-radius: 10px; margin: 20px 0;
            box-shadow: 0 0 20px var(--p1-color);
        }
        .info-text { font-size: 0.9rem; color: #888; text-align: center; max-width: 80%; line-height: 1.5; margin-bottom: 20px; }
        .code-display { font-size: 1.5rem; letter-spacing: 3px; font-weight: bold; color: var(--p1-color); margin-bottom: 10px; }

        /* Join Screen */
        input[type="text"] {
            background: transparent; border: none; border-bottom: 2px solid var(--p2-color);
            color: white; font-size: 1.5rem; text-align: center; padding: 10px; outline: none;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; width: 80%;
        }

        /* Game UI */
        #gameUI {
            position: absolute; inset: 0; pointer-events: none; z-index: 20;
            display: flex; justify-content: space-between; padding: 20px;
        }
        .health-bar { display: flex; gap: 10px; }
        .heart { width: 20px; height: 20px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; transition: 0.3s; }
        .heart.lost { background: transparent; border: 2px solid #555; box-shadow: none; }

        .enemy-status { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        canvas { display: block; width: 100%; height: 100%; background: radial-gradient(circle at center, #111 0%, #000 100%); touch-action: none; }
        
        #connectionStatus { position: absolute; bottom: 20px; font-size: 12px; color: #666; }
        
        /* Modal Info */
        .msg-box {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 10px 20px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); font-size: 12px;
            z-index: 100; transition: opacity 0.5s; opacity: 0;
        }

    </style>
</head>
<body>

    <div class="msg-box" id="msgBox">Conectare...</div>

    <!-- MAIN MENU -->
    <div class="screen" id="menuScreen">
        <h1 class="glow-text">DUAL<br><span style="font-size: 1.5rem; color: #888;">STRIKE</span></h1>
        <button class="btn btn-host" onclick="hostGame()">Gazduiește Joc</button>
        <button class="btn btn-join" onclick="showJoinScreen()">Alătură-te</button>
    </div>

    <!-- HOST LOBBY -->
    <div class="screen hidden" id="hostScreen">
        <h2 style="color: var(--p1-color);">Așteptare Jucător...</h2>
        <div class="info-text">Prietenul tău trebuie să scaneze acest cod QR pentru a se conecta direct.</div>
        <div class="qr-container" id="qrcode"></div>
        <div class="info-text">Sau introduceți codul manual:</div>
        <div class="code-display" id="roomIdDisplay">...</div>
        <button class="btn" style="font-size: 0.9rem;" onclick="location.reload()">Anulează</button>
    </div>

    <!-- JOIN SCREEN -->
    <div class="screen hidden" id="joinScreen">
        <h2 style="color: var(--p2-color); margin-bottom: 20px;">Conectare</h2>
        <div class="info-text">Introdu codul afișat pe ecranul prietenului tău.</div>
        <input type="text" id="joinCodeInput" placeholder="EX: A1B2C" maxlength="6">
        <button class="btn btn-join" onclick="joinGameFromInput()">Conectează-te</button>
        <button class="btn" style="font-size: 0.9rem; margin-top: 20px;" onclick="location.reload()">Înapoi</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="screen hidden" id="gameOverScreen">
        <h1 id="gameOverTitle" class="glow-text" style="font-size: 3rem;">AI CÂȘTIGAT!</h1>
        <button class="btn" onclick="location.reload()">Meniu Principal</button>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div class="screen hidden" id="gameScreen">
        <div id="gameUI">
            <div class="health-bar" id="myHealth">
                <div class="heart"></div><div class="heart"></div><div class="heart"></div>
            </div>
            <div class="enemy-status">Inamic: <span id="enemyHealthText">3</span> HP</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="connectionStatus">P2P Network Disconnected</div>

    <script>
        
        // --- Referințe DOM ---
        const screens = {
            menu: document.getElementById('menuScreen'),
            host: document.getElementById('hostScreen'),
            join: document.getElementById('joinScreen'),
            game: document.getElementById('gameScreen'),
            gameOver: document.getElementById('gameOverScreen')
        };
        const msgBox = document.getElementById('msgBox');
        const connStatus = document.getElementById('connectionStatus');
        
        // --- State Multiplayer ---
        let peer = null;
        let conn = null;
        let isHost = false;
        let myColor = '';
        let enemyColor = '';
        
        // --- Game State ---
        let gameActive = false;
        let myHealth = 3;
        let enemyHealth = 3;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Redimensionare Canvas
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function showMessage(text, duration = 3000) {
            msgBox.innerText = text;
            msgBox.style.opacity = 1;
            setTimeout(() => msgBox.style.opacity = 0, duration);
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        // --- Generare ID scurt ---
        function generateShortId() {
            return Math.random().toString(36).substring(2, 7).toUpperCase();
        }


        // 1. GĂZDUIRE JOC
        function hostGame() {
            isHost = true;
            myColor = '#00f0ff'; // Cyan
            enemyColor = '#ff0055'; // Magenta
            
            const roomId = "CMN-" + generateShortId();
            switchScreen('host');
            document.getElementById('roomIdDisplay').innerText = roomId.replace('CMN-', '');

            // Inițializăm serverul public gratuit PeerJS
            peer = new Peer(roomId);

            peer.on('open', (id) => {
                connStatus.innerText = "Host online: " + id;
                
                // Generare URL pentru QR Code
                const joinUrl = window.location.href.split('?')[0] + "?join=" + id;
                
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById('qrcode'), {
                    text: joinUrl, width: 200, height: 200,
                    colorDark : "#00f0ff", colorLight : "#ffffff"
                });
            });

            peer.on('connection', (connection) => {
                // Un jucător s-a conectat!
                conn = connection;
                setupConnection();
            });

            peer.on('error', (err) => showMessage("Eroare de rețea: " + err.type));
        }

        // 2. ALĂTURARE JOC (GUEST)
        function showJoinScreen() { switchScreen('join'); }

        function joinGameFromInput() {
            const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
            if(code.length === 0) return;
            joinGame("CMN-" + code);
        }

        function joinGame(hostId) {
            isHost = false;
            myColor = '#ff0055'; // Magenta
            enemyColor = '#00f0ff'; // Cyan
            
            showMessage("Conectare la " + hostId + "...");
            peer = new Peer(); // Ne luăm un ID random

            peer.on('open', (id) => {
                // Ne conectăm la Gazdă
                conn = peer.connect(hostId, { reliable: true });
                
                conn.on('open', () => {
                    setupConnection();
                });
                
                conn.on('error', () => showMessage("Conexiune eșuată!"));
            });
        }

        
        function setupConnection() {
            showMessage("CONECTAT!", 2000);
            connStatus.innerText = "Conectat cu succes!";
            
            // Ascultăm mesajele de la celălalt telefon
            conn.on('data', (data) => {
                handleNetworkData(data);
            });

            conn.on('close', () => {
                showMessage("Inamicul a părăsit jocul.", 5000);
                setTimeout(() => location.reload(), 2000);
            });

            // Start Game
            setTimeout(startGame, 1000);
        }

        // Verificăm dacă am deschis link-ul dintr-un QR code
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) {
                switchScreen('menu'); // Doar vizual pt scurt timp
                joinGame(joinId);
            }
        };

        // --- GAME ENGINE ---

        let player = { x: 0.5, y: 0.85, width: 0.15, height: 0.05 }; // Coordonate relative (0.0 - 1.0)
        let bullets = []; // {x, y, vy, isMine}
        let lastShootTime = 0;
        
        // Controale Touch
        let targetX = 0.5;
        
        function startGame() {
            switchScreen('game');
            gameActive = true;
            myHealth = 3;
            enemyHealth = 3;
            bullets = [];
            updateHealthUI();
            
            // Controale - Mișcare navă (Drag pe ecran)
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touchX = e.touches[0].clientX;
                targetX = touchX / canvas.width;
                // Limitare la ecran
                if(targetX < player.width/2) targetX = player.width/2;
                if(targetX > 1 - player.width/2) targetX = 1 - player.width/2;
            });

            // Controale - Tragere (Tap pe ecran)
            canvas.addEventListener('touchstart', (e) => {
                const now = Date.now();
                if(now - lastShootTime > 300) { // Cooldown 300ms
                    shoot();
                    lastShootTime = now;
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function shoot() {
            // Glonțul nostru merge în SUS (y scade)
            const b = { x: player.x, y: player.y - 0.05, vy: -0.015, isMine: true };
            bullets.push(b);
        }

        function handleNetworkData(data) {
            if (!gameActive) return;

            if (data.type === 'bullet') {
                // Magia "DUAL!": Glonțul inamicului iese pe sus la el, intră pe sus la noi.
                // Cum stăm față în față (tip-to-tip), Axa X trebuie inversată vizual!
                const mirroredX = 1.0 - data.x;
                // Viteza devine pozitivă (glonțul inamicului merge în JOS pe ecranul nostru)
                bullets.push({ x: mirroredX, y: 0, vy: 0.015, isMine: false });
            } 
            else if (data.type === 'hit') {
                enemyHealth = data.health;
                document.getElementById('enemyHealthText').innerText = enemyHealth;
                if (enemyHealth <= 0) gameOver(true); // Dacă inamicul are 0 HP, am câștigat
            }
        }

        
        function gameLoop() {
            if (!gameActive) return;

            update();
            draw();

            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Interpolare lină pentru mișcare navă
            player.x += (targetX - player.x) * 0.2;

            // Update Gloanțe
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y += b.vy;

                // 1. Glonțul MEU iese de pe ecran în SUS -> Îl trimit la inamic
                if (b.isMine && b.y < 0) {
                    if (conn && conn.open) {
                        conn.send({ type: 'bullet', x: b.x });
                    }
                    bullets.splice(i, 1); // Eliminăm de pe ecranul local
                    continue;
                }

                // 2. Glonțul INAMIC iese de pe ecran în JOS -> A ratat, dispare
                if (!b.isMine && b.y > 1) {
                    bullets.splice(i, 1);
                    continue;
                }

                // 3. Coliziune: Glonțul INAMIC mă lovește
                if (!b.isMine) {
                    // Verificăm intersecția (Hitbox simplificat la un dreptunghi)
                    const hitX = Math.abs(b.x - player.x) < (player.width / 2);
                    const hitY = Math.abs(b.y - player.y) < (player.height / 2);
                    
                    if (hitX && hitY) {
                        // AM FOST LOVIT!
                        myHealth--;
                        bullets.splice(i, 1); // Distruge glonțul
                        updateHealthUI();
                        
                        // Anunț inamicul că m-a lovit
                        if (conn && conn.open) conn.send({ type: 'hit', health: myHealth });

                        if (myHealth <= 0) {
                            gameOver(false); // Am pierdut
                        }
                    }
                }
            }
        }

        function updateHealthUI() {
            const hearts = document.querySelectorAll('#myHealth .heart');
            hearts.forEach((h, index) => {
                if (index >= myHealth) h.classList.add('lost');
                else h.classList.remove('lost');
            });
            // Efect vizual de damage
            canvas.style.boxShadow = "inset 0 0 50px red";
            setTimeout(() => canvas.style.boxShadow = "none", 100);
        }

        
        function draw() {
            const w = canvas.width;
            const h = canvas.height;

            // Clear frame
            ctx.clearRect(0, 0, w, h);

            // Setăm stil de Neon
            ctx.lineJoin = 'round';
            
            // 1. Desenăm Jucătorul (Nava noastră)
            const px = player.x * w;
            const py = player.y * h;
            const pw = player.width * w;
            const ph = player.height * h;

            ctx.shadowBlur = 20;
            ctx.shadowColor = myColor;
            ctx.fillStyle = myColor;
            
            // Desenăm un triunghi (Nava) îndreptat în SUS
            ctx.beginPath();
            ctx.moveTo(px, py - ph/2); // Vârf
            ctx.lineTo(px - pw/2, py + ph/2); // Stânga jos
            ctx.lineTo(px, py + ph/4); // Centru jos
            ctx.lineTo(px + pw/2, py + ph/2); // Dreapta jos
            ctx.closePath();
            ctx.fill();

            // 2. Desenăm Gloanțele
            for (let b of bullets) {
                const bx = b.x * w;
                const by = b.y * h;
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = b.isMine ? myColor : enemyColor;
                ctx.fillStyle = b.isMine ? '#fff' : enemyColor;

                ctx.beginPath();
                // Gloanțele mele sunt alungite în sus, ale inamicului în jos
                const bLength = h * 0.04;
                ctx.arc(bx, by, w * 0.015, 0, Math.PI * 2);
                ctx.fill();
                
                // Trail (Coadă glonț)
                ctx.beginPath();
                ctx.moveTo(bx, by);
                ctx.lineTo(bx, by - (b.vy * 500)); // Trage linia in sens opus miscarii
                ctx.strokeStyle = b.isMine ? myColor : enemyColor;
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }

        function gameOver(didIWin) {
            gameActive = false;
            switchScreen('gameOver');
            
            const title = document.getElementById('gameOverTitle');
            if (didIWin) {
                title.innerText = "VICTORIE!";
                title.style.color = myColor;
                title.style.textShadow = `0 0 20px ${myColor}`;
            } else {
                title.innerText = "DISTRUS!";
                title.style.color = 'red';
                title.style.textShadow = `0 0 20px red`;
            }
            
            // Deconectare politicoasă
            if (conn) setTimeout(() => conn.close(), 1000);
        }

    </script>
</body>
</html>
