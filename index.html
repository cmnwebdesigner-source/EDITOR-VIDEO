<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMN Scribble - Whiteboard Colaborativ</title>
    
    <!-- Librării pentru WebRTC P2P și QR Code -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-dark: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            width: 100vw; height: 100vh;
            touch-action: none; /* Previne scroll-ul pe mobil la desenare */
        }

        /* --- Meniuri și Ecrane --- */
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            z-index: 10;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .screen.hidden { opacity: 0; pointer-events: none; z-index: -1; transform: scale(1.05); }

        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 30px; text-align: center; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #94a3b8; margin-top: -20px; margin-bottom: 40px; font-size: 1.1rem; }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 15px 40px; font-size: 1.1rem; font-weight: 600;
            border-radius: 30px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            margin: 10px; width: 80%; max-width: 300px;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-3px); box-shadow: 0 15px 25px rgba(99, 102, 241, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); box-shadow: none; }

        .panel {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px);
            padding: 40px 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 450px;
        }

        .qr-wrapper { background: white; padding: 20px; border-radius: 16px; margin: 20px 0; box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); }
        
        .code-input {
            background: rgba(15, 23, 42, 0.8); border: 2px solid var(--primary);
            color: white; font-size: 2.5rem; text-align: center; padding: 15px; border-radius: 16px;
            outline: none; text-transform: uppercase; letter-spacing: 8px; margin: 20px 0; width: 100%;
        }

        /* --- Tabla de Desen (Whiteboard) --- */
        #whiteboardScreen { background: #ffffff; cursor: crosshair; }
        
        canvas {
            display: block;
            width: 100vw; height: 100vh;
            background: #ffffff;
        }

        /* --- Toolbar (Unelte Desen) --- */
        .toolbar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 25px; border-radius: 20px; border: 1px solid var(--glass-border);
            display: flex; gap: 20px; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            z-index: 20; color: var(--text-dark);
        }

        .tool-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .tool-label { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; }

        input[type="color"] {
            -webkit-appearance: none; border: none; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; overflow: hidden; padding: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

        input[type="range"] { width: 100px; accent-color: var(--primary); cursor: pointer; }

        .icon-btn {
            background: #f1f5f9; border: none; width: 40px; height: 40px;
            border-radius: 12px; cursor: pointer; font-size: 1.2rem;
            display: flex; justify-content: center; align-items: center;
            transition: 0.2s; color: #475569;
        }
        .icon-btn:hover { background: #e2e8f0; color: var(--primary); }
        .icon-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4); }

        /* Status Conexiune în joc */
        .conn-status {
            position: absolute; top: 20px; left: 20px;
            background: var(--glass-bg); padding: 8px 15px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 600; color: var(--text-dark);
            display: flex; align-items: center; gap: 8px; z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); backdrop-filter: blur(10px);
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Notificări Toast */
        .toast {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(15, 23, 42, 0.9); color: white; padding: 12px 25px;
            border-radius: 30px; font-size: 14px; font-weight: 600;
            z-index: 100; transition: all 0.4s ease; opacity: 0; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <div class="toast" id="toastBox">Notificare</div>

    <!-- ECRAN 1: Meniu Principal -->
    <div class="screen" id="menuScreen">
        <h1>CMN Scribble</h1>
        <p class="subtitle">Tablă de desen colaborativă în timp real</p>
        <button class="btn" onclick="hostRoom()">Crează o Cameră</button>
        <button class="btn btn-outline" onclick="showJoinScreen()">Alătură-te</button>
    </div>

    <!-- ECRAN 2: Lobby Gazdă -->
    <div class="screen hidden" id="hostScreen">
        <div class="panel">
            <h2 style="margin-bottom: 10px; color: #f8fafc;">Așteptăm partenerul...</h2>
            <p style="font-size: 0.9rem; color: #94a3b8; text-align: center;">Scanează codul de pe alt dispozitiv sau introdu codul manual.</p>
            
            <div class="qr-wrapper" id="qrcode"></div>
            
            <div style="font-size: 2.5rem; font-weight: 800; letter-spacing: 6px; color: var(--primary);" id="roomIdDisplay">...</div>
            
            <button class="btn btn-outline" style="margin-top: 30px;" onclick="location.reload()">Anulează</button>
        </div>
    </div>

    <!-- ECRAN 3: Conectare -->
    <div class="screen hidden" id="joinScreen">
        <div class="panel">
            <h2 style="margin-bottom: 10px; color: #f8fafc;">Intră în Cameră</h2>
            <p style="font-size: 0.9rem; color: #94a3b8; text-align: center;">Introdu codul afișat de gazdă.</p>
            
            <input type="text" class="code-input" id="joinCodeInput" placeholder="A1B2C" maxlength="5">
            
            <button class="btn" style="width: 100%;" onclick="joinRoomFromInput()">Conectează-te</button>
            <button class="btn btn-outline" style="width: 100%; margin-top: 10px;" onclick="location.reload()">Înapoi</button>
        </div>
    </div>

    <!-- ECRAN 4: Whiteboard (Tabla de Desen) -->
    <div class="screen hidden" id="whiteboardScreen">
        
        <div class="conn-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Conectat</span>
        </div>

        <canvas id="drawingBoard"></canvas>
        
        <!-- Bara cu unelte (Toolbar) -->
        <div class="toolbar">
            <div class="tool-group">
                <span class="tool-label">Culoare</span>
                <input type="color" id="colorPicker" value="#000000">
            </div>
            
            <div class="tool-group">
                <span class="tool-label">Grosime</span>
                <input type="range" id="brushSize" min="1" max="40" value="4">
            </div>

            <div class="tool-group" style="flex-direction: row; gap: 10px; margin-left: 10px; align-items: flex-end;">
                <button class="icon-btn active" id="btnPen" title="Pensulă">🖌️</button>
                <button class="icon-btn" id="btnEraser" title="Radieră">🧹</button>
                <div style="width: 1px; height: 30px; background: #cbd5e1; margin: 0 5px;"></div>
                <button class="icon-btn" id="btnClear" title="Șterge Tot" style="color: #ef4444;">🗑️</button>
                <button class="icon-btn" id="btnDownload" title="Descarcă Desen" style="color: #10b981;">💾</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Gestiunea ECRANELOR ȘI NOTIFICĂRILOR ---
        const UI = {
            menu: document.getElementById('menuScreen'),
            host: document.getElementById('hostScreen'),
            join: document.getElementById('joinScreen'),
            whiteboard: document.getElementById('whiteboardScreen'),
            toast: document.getElementById('toastBox')
        };
        
        function showToast(text, duration = 3000) {
            UI.toast.innerText = text;
            UI.toast.classList.add('show');
            setTimeout(() => UI.toast.classList.remove('show'), duration);
        }

        function switchScreen(screenName) {
            Object.values(UI).forEach(s => { if(s.classList) s.classList.add('hidden'); });
            UI[screenName].classList.remove('hidden');
        }

        function generateShortId() { return Math.random().toString(36).substring(2, 7).toUpperCase(); }

        // --- 2. SISTEMUL DE REȚEA WEBRTC (PeerJS) ---
        let peer = null;
        let conn = null;
        
        function hostRoom() {
            const roomId = generateShortId();
            switchScreen('host');
            document.getElementById('roomIdDisplay').innerText = roomId;

            peer = new Peer("CMNSCRB-" + roomId); // Prefix pentru a evita coliziuni globale

            peer.on('open', (id) => {
                showToast("Cameră creată!");
                // Generare QR Code cu link de auto-join
                const joinUrl = window.location.href.split('?')[0] + "?join=" + roomId;
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById('qrcode'), {
                    text: joinUrl, width: 200, height: 200,
                    colorDark : "#4f46e5", colorLight : "#ffffff"
                });
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnectionHandlers();
            });

            peer.on('error', (err) => showToast("Eroare WebRTC: " + err.type));
        }

        function showJoinScreen() { switchScreen('join'); }

        function joinRoomFromInput() {
            const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
            if(code.length === 0) return;
            joinRoom(code);
        }

        function joinRoom(hostId) {
            showToast("Se conectează...");
            peer = new Peer();

            peer.on('open', () => {
                conn = peer.connect("CMNSCRB-" + hostId);
                conn.on('open', () => setupConnectionHandlers());
                conn.on('error', () => showToast("Nu am găsit camera!"));
            });
        }

        function setupConnectionHandlers() {
            showToast("Sincronizat!", 2000);
            switchScreen('whiteboard');
            resizeCanvas(); // Ajustează canvas-ul când ecranul e afișat

            // Recepționare date de la celălalt jucător
            conn.on('data', (data) => {
                if (data.t === 'd') {
                    // Desenare linie (Preluată de la partener)
                    drawLine(data.x0, data.y0, data.x1, data.y1, data.c, data.s, false);
                } else if (data.t === 'c') {
                    // Ștergere tablă (Comandă preluată)
                    clearBoard(false);
                }
            });

            conn.on('close', () => {
                document.getElementById('statusDot').style.background = '#ef4444';
                document.getElementById('statusText').innerText = 'Deconectat';
                showToast("Partenerul a părăsit sesiunea.", 5000);
            });
        }

        // Auto-join pentru scanarea Codului QR
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) { switchScreen('join'); joinRoom(joinId); }
        };

        // --- 3. MOTORUL DE DESENARE PE CANVAS ---
        const canvas = document.getElementById('drawingBoard');
        const ctx = canvas.getContext('2d');
        
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        
        // Unelte active
        let currentColor = '#000000';
        let currentSize = 4;
        let isEraserMode = false;

        // Referințe Controale UI
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const btnPen = document.getElementById('btnPen');
        const btnEraser = document.getElementById('btnEraser');

        // Funcție pentru fundal alb (dacă nu-l punem, salvarea imaginii va fi cu fundal negru transparent)
        function initWhiteBackground() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Redimensionare Canvas la mărimea ferestrei
        function resizeCanvas() {
            // Salvăm desenul curent
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            initWhiteBackground();
            // Restaurăm desenul (îl punem înapoi peste noul canvas redimensionat)
            ctx.putImageData(imgData, 0, 0);
            
            // Setări implicite pensulă
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
        }
        window.addEventListener('resize', resizeCanvas);
        initWhiteBackground(); // Initial call

        // Preia coordonatele ABSOLUTE ale mouse-ului/degetului
        function getCoords(e) {
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: clientX, y: clientY };
        }

        // Functia principala de desen
        function drawLine(x0, y0, x1, y1, color, size, emit) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.strokeStyle = color;
            ctx.lineWidth = size;
            ctx.stroke();
            ctx.closePath();

            // Dacă emit == true, înseamnă că NOI am desenat. Trimitem coordonatele partenerului!
            if (!emit || !conn || !conn.open) return;
            
            // Trimitem un pachet ultra-mic JSON
            conn.send({
                t: 'd', // Type: Draw
                x0: x0, y0: y0,
                x1: x1, y1: y1,
                c: color, s: size
            });
        }

        function clearBoard(emit) {
            initWhiteBackground();
            if (emit && conn && conn.open) {
                conn.send({ t: 'c' }); // Type: Clear
            }
        }

        // --- 4. EVENIMENTE MOUSE & TOUCH ---
        
        function startDrawing(e) {
            isDrawing = true;
            const pos = getCoords(e);
            lastX = pos.x;
            lastY = pos.y;
            // Desenează un punct imediat la click (pentru puncte simple)
            drawLine(lastX, lastY, lastX, lastY, isEraserMode ? '#ffffff' : currentColor, currentSize, true);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // Oprește comportamentul nativ de scroll (Pinch/Zoom) pe mobil
            
            const pos = getCoords(e);
            const useColor = isEraserMode ? '#ffffff' : currentColor;
            
            drawLine(lastX, lastY, pos.x, pos.y, useColor, currentSize, true);
            
            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Mouse Events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch Events (Mobil)
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

        // --- 5. LOGICA TOOLBAR-ULUI ---
        
        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            if(isEraserMode) { // Dacă alegi o culoare, se dezactivează radiera automat
                isEraserMode = false;
                btnEraser.classList.remove('active');
                btnPen.classList.add('active');
            }
        });

        brushSize.addEventListener('input', (e) => {
            currentSize = e.target.value;
        });

        btnPen.addEventListener('click', () => {
            isEraserMode = false;
            btnPen.classList.add('active');
            btnEraser.classList.remove('active');
        });

        btnEraser.addEventListener('click', () => {
            isEraserMode = true;
            btnEraser.classList.add('active');
            btnPen.classList.remove('active');
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            if(confirm("Ești sigur că vrei să ștergi tot desenul pentru amândoi?")) {
                clearBoard(true);
            }
        });

        document.getElementById('btnDownload').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `Scribble_CMN_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast("Desen descărcat!");
        });

    </script>
</body>
</html>
