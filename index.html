<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CMN Magic Eraser Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.85);
            --accent: #ff2a5f; /* Culoare specifică uneltelor de 'ștergere' */
            --accent-hover: #ff4d79;
            --text-main: #ffffff;
            --text-muted: #888899;
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(255, 42, 95, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #0a0a0c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* App Container */
        #app-root {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        header {
            position: absolute; top: 0; left: 0; right: 0;
            height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 50;
            pointer-events: none; /* Lăsăm click-urile să treacă prin fundal */
        }
        header > * { pointer-events: auto; } /* Reactivăm butoanele */

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .top-tools { display: flex; gap: 15px; align-items: center; }
        
        .btn-icon {
            background: rgba(255,255,255,0.1); border: 1px solid var(--border);
            color: white; width: 36px; height: 36px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; backdrop-filter: blur(10px); transition: 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.2); }
        .btn-icon.disabled { opacity: 0.3; pointer-events: none; }

        .btn-export {
            background: var(--text-main); color: #000; border: none;
            padding: 8px 18px; border-radius: 20px; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; transition: 0.2s;
        }
        .btn-export:hover { background: var(--accent); color: white; box-shadow: var(--glow); }

        /* Workspace & Canvas */
        .workspace {
            flex: 1;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform-origin: center center;
        }

        #displayCanvas { z-index: 10; }
        /* Masca o afișăm semi-transparentă roșie */
        #maskCanvas { z-index: 20; opacity: 0.6; mix-blend-mode: multiply; pointer-events: none; }

        /* Custom Cursor for Brush */
        #brushCursor {
            position: fixed; pointer-events: none; z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.8); background: rgba(255, 42, 95, 0.3);
            border-radius: 50%; transform: translate(-50%, -50%); display: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Toolbar Bottom */
        .bottom-toolbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 15px 25px; display: flex; flex-direction: column; gap: 15px;
            z-index: 50; width: 90%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .tool-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        
        .slider-container { flex: 1; display: flex; align-items: center; gap: 10px; }
        .slider-container span { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        
        input[type=range] {
            flex: 1; -webkit-appearance: none; background: transparent; height: 20px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: var(--text-main); margin-top: -7px; cursor: pointer; border: 2px solid var(--panel-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .btn-magic {
            background: var(--accent); color: white; border: none;
            padding: 12px 20px; border-radius: 12px; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px;
            flex: 1; justify-content: center; box-shadow: var(--glow);
        }
        .btn-magic:active { transform: scale(0.95); }
        .btn-magic.disabled { background: #333; color: #666; box-shadow: none; pointer-events: none; }

        .btn-clear {
            background: transparent; border: 1px solid var(--border); color: var(--text-main);
            padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Upload Splash */
        .upload-overlay {
            position: absolute; inset: 0; background: var(--bg-dark); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .upload-box {
            border: 2px dashed var(--accent); padding: 40px; border-radius: 20px; text-align: center;
            cursor: pointer; background: rgba(255, 42, 95, 0.05); transition: 0.3s;
        }
        .upload-box:hover { background: rgba(255, 42, 95, 0.1); box-shadow: var(--glow); }
        .upload-box svg { width: 50px; height: 50px; fill: var(--accent); margin-bottom: 15px; }
        .upload-box h2 { font-size: 1.5rem; margin-bottom: 5px; }
        .upload-box p { color: var(--text-muted); font-size: 0.9rem; }
        #fileInput { display: none; }

        /* Loader */
        .loader-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 300;
            display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="app-root">
        
        <!-- Ecran Încărcare -->
        <div class="upload-overlay" id="uploadScreen">
            <label class="upload-box" for="fileInput">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z"/></svg>
                <h2>Încarcă Fotografia</h2>
                <p>Selectează imaginea pentru retușare</p>
            </label>
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp">
        </div>

        <!-- Ecran Procesare (AI Simulation) -->
        <div class="loader-overlay" id="loaderScreen">
            <div class="spinner"></div>
            <h3 style="margin-bottom: 5px;">Se elimină obiectele...</h3>
            <p style="color: var(--text-muted); font-size: 12px;">Se calculează pixelii adiacenți (Content-Aware)</p>
        </div>

        <!-- Header -->
        <header>
            <div class="logo">CMN <span>Retouch</span></div>
            <div class="top-tools">
                <div class="btn-icon disabled" id="btnUndo" title="Undo (Înapoi)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
                </div>
                <button class="btn-export" id="btnExport">Salvează</button>
            </div>
        </header>

        <!-- Zona de Editare (Canvas-uri suprapuse) -->
        <div class="workspace" id="workspace">
            <!-- Canvas-ul cu imaginea originală/modificată -->
            <canvas id="displayCanvas"></canvas>
            <!-- Canvas-ul transparent pe care desenăm masca roșie -->
            <canvas id="maskCanvas"></canvas>
            
            <div id="brushCursor"></div>
        </div>

        <!-- Toolbar Jos -->
        <div class="bottom-toolbar">
            <div class="tool-row">
                <div class="slider-container">
                    <span>MĂRIME PENSULĂ</span>
                    <input type="range" id="brushSize" min="5" max="100" value="30">
                </div>
            </div>
            <div class="tool-row">
                <button class="btn-clear" id="btnClearMask" title="Șterge Selecția">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
                <button class="btn-magic disabled" id="btnMagicErase">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.81 14.12l7.06 7.06c.2.2.51.2.71 0l7.06-7.06c.2-.2.2-.51 0-.71L10.59 6.34c-.2-.2-.51-.2-.71 0L2.81 13.41c-.2.2-.2.52 0 .71zM11.5 8.16l4.66 4.66-4.66 4.66-4.66-4.66 4.66-4.66zM22 13h-4v-2h4v2zm-2-6h-2V5h2v2zm0 12h-2v-2h2v2zM6 5H4V3h2v2zm-2 6H2V9h2v2z"/></svg>
                    ȘTERGE OBIECT
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- Referințe DOM ---
        const UI = {
            fileInput: document.getElementById('fileInput'),
            uploadScreen: document.getElementById('uploadScreen'),
            loaderScreen: document.getElementById('loaderScreen'),
            workspace: document.getElementById('workspace'),
            displayCanvas: document.getElementById('displayCanvas'),
            maskCanvas: document.getElementById('maskCanvas'),
            brushCursor: document.getElementById('brushCursor'),
            brushSize: document.getElementById('brushSize'),
            btnMagicErase: document.getElementById('btnMagicErase'),
            btnClearMask: document.getElementById('btnClearMask'),
            btnUndo: document.getElementById('btnUndo'),
            btnExport: document.getElementById('btnExport')
        };

        const ctxDisplay = UI.displayCanvas.getContext('2d', { willReadFrequently: true });
        const ctxMask = UI.maskCanvas.getContext('2d', { willReadFrequently: true });

        // --- State Management ---
        const State = {
            imageLoaded: false,
            brushSize: 30,
            isDrawing: false,
            hasMask: false,
            scale: 1, // Pentru responsivitate pe ecran
            imageObj: new Image(),
            history: [], // Istoric pentru Undo (Salvăm ImageData)
            maxHistory: 5
        };

        // --- 1. Încărcarea și Ajustarea Imaginii pe Ecran ---
        UI.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                State.imageObj.src = event.target.result;
                State.imageObj.onload = () => {
                    UI.uploadScreen.style.display = 'none';
                    setupCanvases();
                    saveHistory(); // Salvăm starea inițială
                };
            };
            reader.readAsDataURL(file);
        });

        function setupCanvases() {
            // Setăm rezoluția internă a canvas-urilor la rezoluția reală a imaginii
            UI.displayCanvas.width = State.imageObj.width;
            UI.displayCanvas.height = State.imageObj.height;
            UI.maskCanvas.width = State.imageObj.width;
            UI.maskCanvas.height = State.imageObj.height;

            // Desenăm imaginea
            ctxDisplay.drawImage(State.imageObj, 0, 0);
            
            // Setăm stilul pentru desenat pe mască
            ctxMask.lineCap = 'round';
            ctxMask.lineJoin = 'round';
            ctxMask.strokeStyle = '#ff0000'; // Roșu pentru mască

            fitCanvasesToScreen();
            State.imageLoaded = true;
        }

        // --- STREAMING_CHUNK:Implementing responsive sizing and viewport math... ---
        function fitCanvasesToScreen() {
            const workRect = UI.workspace.getBoundingClientRect();
            // Lăsăm padding sus și jos
            const maxWidth = workRect.width * 0.95;
            const maxHeight = workRect.height * 0.8;

            const ratioX = maxWidth / UI.displayCanvas.width;
            const ratioY = maxHeight / UI.displayCanvas.height;
            State.scale = Math.min(ratioX, ratioY, 1); // Nu scalăm peste dimensiunea originală

            const finalWidth = UI.displayCanvas.width * State.scale;
            const finalHeight = UI.displayCanvas.height * State.scale;

            const cssText = `width: ${finalWidth}px; height: ${finalHeight}px;`;
            UI.displayCanvas.style.cssText = cssText;
            UI.maskCanvas.style.cssText = cssText;
        }

        window.addEventListener('resize', () => {
            if (State.imageLoaded) fitCanvasesToScreen();
        });

        // --- 2. Logica de Desenare a Măștii (Brush) ---
        // Convertim coordonatele mouse/touch raportate la ecran în coordonate interne ale canvas-ului
        function getCanvasCoords(e) {
            const rect = UI.maskCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Scalare înapoi de la CSS width la rezoluția reală internă
            const x = (clientX - rect.left) / State.scale;
            const y = (clientY - rect.top) / State.scale;
            return { x, y };
        }

        function startDrawing(e) {
            if (!State.imageLoaded) return;
            e.preventDefault();
            State.isDrawing = true;
            State.hasMask = true;
            
            const coords = getCanvasCoords(e);
            ctxMask.lineWidth = State.brushSize / State.scale; // Ajustăm grosimea relativ la zoom
            ctxMask.beginPath();
            ctxMask.moveTo(coords.x, coords.y);
            
            // Desenăm un punct chiar dacă e doar un click scurt
            ctxMask.lineTo(coords.x + 0.1, coords.y);
            ctxMask.stroke();
            
            updateBrushCursor(e);
            UI.btnMagicErase.classList.remove('disabled');
        }

        function draw(e) {
            updateBrushCursor(e);
            if (!State.isDrawing) return;
            e.preventDefault();
            const coords = getCanvasCoords(e);
            ctxMask.lineTo(coords.x, coords.y);
            ctxMask.stroke();
        }

        function stopDrawing() {
            State.isDrawing = false;
        }

        // --- STREAMING_CHUNK:Adding touch/mouse event listeners and UI interactions... ---
        // Evenimente Mouse
        UI.maskCanvas.addEventListener('mousedown', startDrawing);
        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        
        // Evenimente Touch (Mobile)
        UI.maskCanvas.addEventListener('touchstart', startDrawing, { passive: false });
        window.addEventListener('touchmove', draw, { passive: false });
        window.addEventListener('touchend', stopDrawing);

        // Control Cursor Personalizat
        function updateBrushCursor(e) {
            if (!State.imageLoaded || (e.touches && e.type !== 'touchstart' && e.type !== 'touchmove')) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            UI.brushCursor.style.display = 'block';
            UI.brushCursor.style.left = `${clientX}px`;
            UI.brushCursor.style.top = `${clientY}px`;
            UI.brushCursor.style.width = `${State.brushSize}px`;
            UI.brushCursor.style.height = `${State.brushSize}px`;
        }
        
        UI.workspace.addEventListener('mouseenter', () => { if(State.imageLoaded) UI.brushCursor.style.display = 'block'; });
        UI.workspace.addEventListener('mouseleave', () => UI.brushCursor.style.display = 'none');

        // Controale UI Bottom
        UI.brushSize.addEventListener('input', (e) => {
            State.brushSize = e.target.value;
            // Trigger cursor update
            UI.brushCursor.style.width = `${State.brushSize}px`;
            UI.brushCursor.style.height = `${State.brushSize}px`;
        });

        UI.btnClearMask.addEventListener('click', clearMask);

        function clearMask() {
            ctxMask.clearRect(0, 0, UI.maskCanvas.width, UI.maskCanvas.height);
            State.hasMask = false;
            UI.btnMagicErase.classList.add('disabled');
        }

        // --- 3. Undo / Istoric ---
        function saveHistory() {
            const currentData = ctxDisplay.getImageData(0, 0, UI.displayCanvas.width, UI.displayCanvas.height);
            State.history.push(currentData);
            if (State.history.length > State.maxHistory) State.history.shift();
            
            if (State.history.length > 1) UI.btnUndo.classList.remove('disabled');
        }

        UI.btnUndo.addEventListener('click', () => {
            if (State.history.length > 1) {
                State.history.pop(); // Aruncăm starea curentă
                const previousData = State.history[State.history.length - 1];
                ctxDisplay.putImageData(previousData, 0, 0);
                
                if (State.history.length === 1) UI.btnUndo.classList.add('disabled');
                clearMask();
            }
        });

        // --- 4. ALGORITMUL MAGIC (INPAINTING - CONTENT AWARE FILL) ---
        // Deoarece nu putem folosi Rețele Neurale de 500MB într-un fișier HTML,
        // Am scris un algoritm de "Edge-Bleed Inpainting" în JavaScript.
        // Găsește pixelii roșii ai măștii și îi înlocuiește progresiv cu media
        // pixelilor curați de pe margine, "topind" gaura dinspre exterior spre interior.
        // --- STREAMING_CHUNK:Implementing the core Content-Aware Fill (Inpainting) algorithm in JS... ---
        
        UI.btnMagicErase.addEventListener('click', () => {
            if (!State.hasMask) return;
            
            UI.loaderScreen.style.display = 'flex';
            
            // Oferim timp UI-ului să randeze loader-ul înainte de a îngheța thread-ul JS
            setTimeout(() => {
                processInpainting();
                UI.loaderScreen.style.display = 'none';
                clearMask();
                saveHistory(); // Salvăm noua stare
            }, 100);
        });

        function processInpainting() {
            const w = UI.displayCanvas.width;
            const h = UI.displayCanvas.height;
            const imgData = ctxDisplay.getImageData(0, 0, w, h);
            const maskData = ctxMask.getImageData(0, 0, w, h);
            
            const pixels = imgData.data;
            const mask = maskData.data;
            
            // 1. Creăm un array binar pentru a ști ușor ce e mascat (1) și ce nu (0)
            let isMasked = new Uint8Array(w * h);
            let maskedCount = 0;
            for (let i = 0; i < mask.length; i += 4) {
                // Dacă canalul Alpha al măștii este > 0, înseamnă că am desenat acolo
                if (mask[i + 3] > 0) {
                    isMasked[i / 4] = 1;
                    maskedCount++;
                }
            }

            if (maskedCount === 0) return;

            // 2. Iterative Edge Bleed Algorithm (Fast Box-blur inward)
            // Executăm multiple treceri (passes) pentru a umple de la margine spre centru
            const passes = 30; // Mai multe treceri = acoperire mai mare, dar mai lent
            const tempPixels = new Uint8ClampedArray(pixels);

            for (let pass = 0; pass < passes; pass++) {
                let changed = false;
                
                // Copiem buffer-ul curent pentru a citi din starea anterioară și a scrie în cea nouă
                const readPixels = new Uint8ClampedArray(tempPixels);
                const readMask = new Uint8Array(isMasked);

                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const idx = y * w + x;
                        
                        // Dacă pixelul e mascat, încercăm să-i dăm o valoare
                        if (readMask[idx] === 1) {
                            let r = 0, g = 0, b = 0, count = 0;

                            // Verificăm vecinii (kernel 3x3)
                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    if (dx === 0 && dy === 0) continue;
                                    const nx = x + dx;
                                    const ny = y + dy;
                                    
                                    if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                        const nIdx = ny * w + nx;
                                        // Luăm culoarea doar de la pixelii NE-mascați (sau deja reparați în pașii anteriori)
                                        if (readMask[nIdx] === 0) {
                                            const pIdx = nIdx * 4;
                                            r += readPixels[pIdx];
                                            g += readPixels[pIdx + 1];
                                            b += readPixels[pIdx + 2];
                                            count++;
                                        }
                                    }
                                }
                            }

                            // Dacă am găsit vecini buni pe marginea măștii, facem media culorilor
                            if (count > 0) {
                                const pIdx = idx * 4;
                                tempPixels[pIdx] = r / count;
                                tempPixels[pIdx + 1] = g / count;
                                tempPixels[pIdx + 2] = b / count;
                                tempPixels[pIdx + 3] = 255; // Opacitate completă
                                
                                // Marcăm pixelul ca reparat pentru runda următoare
                                isMasked[idx] = 0; 
                                changed = true;
                            }
                        }
                    }
                }
                
                // Dacă nu mai avem pixeli de umplut (obiect mic) sau am terminat trecerile
                if (!changed) break; 
            }

            // 3. (Opțional dar recomandat) Un mic Blur Gaussian final STRICT pe zona reparată
            // pentru a amesteca mai natural pixelii aduși de pe margini
            // (Îl sărim aici pentru a păstra performanța JS în browser)

            // Suprascriem imaginea vizibilă cu datele procesate
            ctxDisplay.putImageData(new ImageData(tempPixels, w, h), 0, 0);
        }

        // --- 5. Export ---
        // --- STREAMING_CHUNK:Finalizing UI logic and download export... ---
        UI.btnExport.addEventListener('click', () => {
            if (!State.imageLoaded) return;
            
            // Convertim direct imaginea din displayCanvas într-un fișier
            const dataURL = UI.displayCanvas.toDataURL('image/jpeg', 0.95); // 95% Calitate
            
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `CMN_Retouch_${Date.now()}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

    </script>
</body>
</html>
